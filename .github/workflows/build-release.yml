name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            rid: linux-x64
            platform: linux
          - os: windows-latest
            rid: win-x64
            platform: windows
          - os: macos-latest
            rid: osx-x64
            platform: macos
          - os: macos-latest
            rid: osx-arm64
            platform: macos

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag (Windows)
        id: version-windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          $version = $tag.TrimStart('v', 'V')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Extract version from tag (Linux)
        id: version-linux
        if: matrix.os == 'ubuntu-latest'
        shell: pwsh
        run: |
          $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          $version = $tag.TrimStart('v', 'V')
          "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Extract version from tag (macOS)
        id: version-macos
        if: matrix.os == 'macos-latest'
        shell: pwsh
        run: |
          $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          $version = $tag.TrimStart('v', 'V')
          "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore UnbeatableStandaloneEditor.sln

      - name: Publish (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          .\scripts\publish.ps1 -Runtime ${{ matrix.rid }} -Configuration Release -Version ${{ steps.version-windows.outputs.VERSION }}

      - name: Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: pwsh
        run: |
          ./scripts/publish.ps1 -Runtime ${{ matrix.rid }} -Configuration Release -Version ${{ steps.version-linux.outputs.VERSION }}

      - name: Publish (macOS)
        if: matrix.os == 'macos-latest'
        shell: pwsh
        run: |
          ./scripts/publish.ps1 -Runtime ${{ matrix.rid }} -Configuration Release -Version ${{ steps.version-macos.outputs.VERSION }}
          New-Item -ItemType Directory -Force -Path "macos-staging/${{ matrix.rid }}" | Out-Null
          Copy-Item -Recurse -Force "UnbeatableStandaloneEditor/publish/*" "macos-staging/${{ matrix.rid }}/"

      - name: Create release package (macOS staging)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: unbeatable-editor-macos-${{ matrix.rid }}
          path: macos-staging/${{ matrix.rid }}

      - name: Create release package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd UnbeatableStandaloneEditor/publish
          zip -r "../../unbeatable-editor-${{ matrix.platform }}-x64.zip" *

      - name: Create release package (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Compress-Archive -Path "UnbeatableStandaloneEditor/publish/*" -DestinationPath "unbeatable-editor-${{ matrix.platform }}-x64.zip"

      - name: Upload artifact
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: unbeatable-editor-${{ matrix.platform }}-${{ matrix.rid }}
          path: ${{ format('unbeatable-editor-{0}-x64.zip', matrix.platform) }}

  bundle-macos:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS staging artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unbeatable-editor-macos-*
          merge-multiple: true
          path: macos-staging

      - name: Bundle macOS architectures into a single package
        run: |
          cp "macos-staging/osx-arm64/UnbeatableStandaloneEditor" "macos-staging/osx-x64/UnbeatableStandaloneEditor-arm64"
          mv "macos-staging/osx-x64/UnbeatableStandaloneEditor" "macos-staging/osx-x64/UnbeatableStandaloneEditor-x64"
          chmod +x "macos-staging/osx-x64/UnbeatableStandaloneEditor-x64" "macos-staging/osx-x64/UnbeatableStandaloneEditor-arm64"
          cd "macos-staging/osx-x64"
          zip -r "../../unbeatable-editor-macos-x64.zip" *

      - name: Upload bundled macOS package
        uses: actions/upload-artifact@v4
        with:
          name: unbeatable-editor-macos
          path: unbeatable-editor-macos-x64.zip

  release:
    needs: [build, bundle-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Ensure release notes exist
        run: test -f .github/WHATSNEW.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          body_path: .github/WHATSNEW.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
